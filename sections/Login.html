<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="Login.css" rel="stylesheet"/>
</head>
<body>
    <div class="miandiv">
        <div class="listdiv">
            <img src="../assets/digi.jpg"/>
            <form>
            <div class="inputdiv">
                <label for="username">نام و نام خانوادگی</label>
                <input class="hov dirc" type="text" name="username" id="username" value="آریا اسماعیلیان"/>
            </div>
            <div class="inputdiv">
                <label for="email">ایمیل</label>
                <input class="hov" type="email" name="email" id="email" placeholder="example@gmail.com"/>
            </div>
            <div class="inputdiv">
                <label for="password">رمز عبور</label>
                <input class="hov" type="password" name="password" id="password"/>
            </div>
            <div class="inputdiv">
                <label for="sen">تاریخ تولد</label>
                <div class="inputdiv divtavalod">
                <input class="input3 hov" type="number" name="day" id="sen" placeholder="روز"/>
                <input class="input3 hov" type="number" name="month" id="sen" placeholder="ماه"/>
                <input class="input3 hov" type="number" name="year" id="sen" placeholder="سال"/>
                </div>
            </div>
            <div class="inputdiv checkboxdiv">
                
                <label for="checkbox">شرایط و قوانین را میپذیرم</label>
                <input id="checkbox" type="checkbox" required/>
            </div>
            <div class="inputdiv">
                <button type="submit">تایید</button>
            </div>
            </form>
        </div>
    </div>
</body>
</html>
